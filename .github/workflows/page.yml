name: Déployer sur GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Définit les permissions GITHUB_TOKEN pour le déploiement
permissions:
  contents: read
  pages: write
  id-token: write

# Permet un seul déploiement à la fois
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Installer les dépendances
        run: npm ci
      
      - name: Builder le site
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Uploader l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # ou './build' selon votre framework
      
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
